# ──────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — User Explorer
# Ramas activas: develop (test + validation) | main (test + validation + deploy)
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

# Cancela ejecuciones anteriores del mismo workflow en la misma rama
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 · test
  # Instala dependencias y ejecuta la suite de pruebas con cobertura.
  # Se ejecuta en: develop y main
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas con cobertura
        run: npm run test:ci

      - name: Subir reporte de cobertura como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 · validation
  # Verifica que los archivos críticos del proyecto estén presentes.
  # Depende de: test (solo se ejecuta si test pasa)
  # Se ejecuta en: develop y main
  # ────────────────────────────────────────────────────────────────────────────
  validation:
    name: ✅ Validación de estructura
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Verificar archivos requeridos
        run: |
          echo "── Verificando estructura del proyecto ──"

          MISSING=0

          check_file() {
            if [ -f "$1" ]; then
              echo "  ✔ $1"
            else
              echo "  ✘ $1 — NO encontrado"
              MISSING=$((MISSING + 1))
            fi
          }

          check_file "index.html"
          check_file "app.json"
          check_file "src/api.js"
          check_file "src/validator.js"
          check_file "package.json"

          echo ""
          if [ "$MISSING" -gt 0 ]; then
            echo "❌ Faltan $MISSING archivo(s) requerido(s). Pipeline detenido."
            exit 1
          else
            echo "✅ Todos los archivos requeridos están presentes."
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 · deploy
  # Publica la aplicación en GitHub Pages.
  # Depende de: validation
  # Se ejecuta en: solo rama main (push directo, no PR)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy a GitHub Pages
    runs-on: ubuntu-latest
    needs: validation

    # Solo se ejecuta en push a main (no en pull_request)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Permisos necesarios para publicar en GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto de Pages (raíz del proyecto)
        uses: actions/upload-pages-artifact@v3
        with:
          # Publica todo el contenido de la raíz del repositorio
          path: '.'

      - name: Desplegar en GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
