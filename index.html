<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios · Claude-style</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- FontAwesome 6 -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg-0: #0f0b17;
      --bg-1: #171124;
      --bg-2: #1f1732;
      --border: #2a2141;
      --text: #ece6f7;
      --text-muted: #a79ec2;
      --accent: #a97bff;
      --accent-2: #7c4dff;
      --danger: #ff6b8a;
    }

    html, body {
      background: radial-gradient(1200px 600px at 10% -10%, #2a1850 0%, var(--bg-0) 55%) no-repeat fixed;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
    }

    .navbar-brand {
      color: var(--text) !important;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .brand-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      margin-right: 8px;
      box-shadow: 0 0 12px rgba(169, 123, 255, 0.6);
    }

    .card-surface {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    .btn-accent {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      border: none;
      color: #fff;
      font-weight: 500;
      border-radius: 10px;
      padding: 0.55rem 1.1rem;
      transition: transform 0.08s ease, box-shadow 0.2s ease;
    }
    .btn-accent:hover {
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(124, 77, 255, 0.35);
    }

    table.users-table {
      --bs-table-bg: transparent;
      --bs-table-color: var(--text);
      --bs-table-border-color: var(--border);
      --bs-table-hover-bg: rgba(169, 123, 255, 0.08);
      --bs-table-hover-color: var(--text);
      margin-bottom: 0;
    }
    table.users-table thead th {
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      background: transparent;
    }
    table.users-table tbody td {
      border-color: var(--border);
      vertical-align: middle;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--accent);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }
    .icon-btn:hover {
      border-color: var(--accent);
      background: rgba(169, 123, 255, 0.12);
      color: #fff;
    }

    .modal-content {
      background: var(--bg-1);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .modal-header, .modal-footer {
      border-color: var(--border);
    }
    .modal-header .btn-close {
      filter: invert(1) grayscale(1) brightness(1.6);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.6rem 0;
      border-bottom: 1px dashed var(--border);
    }
    .detail-row:last-child { border-bottom: 0; }
    .detail-label {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .detail-value { text-align: right; word-break: break-word; }

    a.map-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    a.map-link:hover { color: #fff; }

    .alert-error {
      background: rgba(255, 107, 138, 0.1);
      border: 1px solid rgba(255, 107, 138, 0.4);
      color: #ffc2cf;
      border-radius: 10px;
    }

    .skeleton {
      color: var(--text-muted);
      font-style: italic;
      padding: 1rem;
    }

    .spinner-border-sm { vertical-align: -2px; }
  </style>
</head>
<body>
  <nav class="navbar py-3">
    <div class="container">
      <span class="navbar-brand mb-0 h1">
        <span class="brand-dot"></span>
        User Explorer
      </span>
    </div>
  </nav>

  <main class="container pb-5">
    <div class="card-surface p-4 p-md-5">
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-4">
        <div>
          <h2 class="mb-1">Directorio de usuarios</h2>
          <p class="text-muted mb-0" style="color: var(--text-muted) !important;">
            Consume datos desde jsonplaceholder y los valida antes de mostrarlos.
          </p>
        </div>
        <button id="loadUsersBtn" class="btn btn-accent">
          <i class="fa-solid fa-cloud-arrow-down me-2"></i>Cargar usuarios
        </button>
      </div>

      <div id="errorBox" class="alert alert-error d-none" role="alert"></div>

      <div class="table-responsive">
        <table class="table users-table align-middle">
          <thead>
            <tr>
              <th scope="col">Nombre</th>
              <th scope="col">Email</th>
              <th scope="col">Ciudad</th>
              <th scope="col" class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="usersTbody">
            <tr><td colspan="4" class="skeleton text-center">Sin datos. Pulsa "Cargar usuarios".</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal de detalle -->
  <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="userModalLabel">Detalle del usuario</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body" id="userModalBody">
          <div class="skeleton">Cargando…</div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-accent" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap bundle (incluye Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- App (ESM) -->
  <script type="module" src="./src/app.js"></script>
</body>
</html>
